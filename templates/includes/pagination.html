{% if is_paginated %}
  <div class="d-inline-flex align-items-center gap-3 bg-white border rounded shadow-sm px-3 py-2">

    {% if page_obj.has_previous %}
      <a class="btn btn-outline-secondary btn-sm fw-medium shadow-none" href="?page={{ page_obj.previous_page_number }}">Prev</a>
    {% else %}
      <button class="btn btn-outline-secondary btn-sm fw-medium opacity-50" disabled>Prev</button>
    {% endif %}

    <span class="text-secondary fw-semibold fs-6 px-1 user-select-none">
      {{ page_obj.number }} <span class="text-muted fw-light mx-1">/</span> {{ page_obj.paginator.num_pages }}
    </span>

    {% if page_obj.has_next %}
      <a class="btn btn-outline-secondary btn-sm fw-medium shadow-none" href="?page={{ page_obj.next_page_number }}">Next</a>
    {% else %}
      <button class="btn btn-outline-secondary btn-sm fw-medium opacity-50" disabled>Next</button>
    {% endif %}

  </div>
{% endif %}
