{% extends 'base.html' %}
{% load crispy_forms_filters %}

{% block content %}
	<h1 class="fw-bold text-dark m-0">
    {{ object|yesno:"Update,Create" }}
    {% block class_name %}
    {% endblock %}
  </h1>
  <form action="" method="POST" novalidate>
    {% csrf_token %}
    {{ form|crispy }}
    {% if object %}
      <input class="btn btn-success mt-3" type="submit" value="Update">
    {% else %}
        <input class="btn btn-success mt-3" type="submit" value="Create">
    {% endif %}
  </form>
  {% block back_button%}
  {% endblock %}
{% endblock %}
