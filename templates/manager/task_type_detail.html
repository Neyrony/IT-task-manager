{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-10 col-lg-9 col-xl-8">

    <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
      <a class="text-decoration-none fw-medium d-inline-flex align-items-center gap-2 text-secondary link-primary" href="{% url 'manager:task_type_list' %}">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-left" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
        </svg>
        Back to Task types
      </a>
      <div class="d-flex gap-2">
        <a class="btn btn-sm btn-outline-secondary px-3 fw-medium" href="#">Edit</a>
        <a class="btn btn-sm btn-outline-danger px-3 fw-medium" href="#">Delete</a>
      </div>
    </div>

    <div class="mb-5">
      <span class="text-uppercase text-secondary small fw-bold opacity-75">Task type Info</span>
      <h1 class="fw-bold text-dark mt-1 mb-0 h2">
        {{ task_type.name }}
      </h1>
    </div>

    <div class="d-flex flex-column gap-3">

      <div class="row align-items-center py-2">
        <div class="col-sm-3 text-uppercase text-muted fw-bold small">Task type Name</div>
        <div class="col-sm-9 text-dark fw-medium">
          {{ task_type.name }}
        </div>
      </div>

    </div>

  </div>
</div>
{% endblock %}
