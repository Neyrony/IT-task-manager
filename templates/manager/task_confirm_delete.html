{% extends 'base.html' %}

{% block content %}
  <h1>Delete task {{ task.name }}</h1>
  <p><i>Notice, if you delete this task all assignees will lose it</i></p>
  <form action="" method="POST">
    {% csrf_token %}
    <input class="btn btn-danger mt-3" type="submit" value="Delete">
  </form>
  <a class="btn btn-primary mt-3" href="{% url 'manager:task_detail' task.pk %}">Cancel</a>
{% endblock %}
