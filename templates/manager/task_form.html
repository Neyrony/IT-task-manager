{% extends 'base.html' %}
{% load crispy_forms_filters %}


{% block content %}
  <h1>{{ object|yesno:"Update,Create" }} task</h1>
  <form action="" method="POST">
    {% csrf_token %}
    {{ form|crispy }}
    <input class="btn btn-success mt-3" type="submit" value="Submit">
  </form>
  {% if object %}
    <a class="btn btn-primary mt-3" href="{% url 'manager:task_detail' task.pk %}">Back to Task</a>
  {% else %}
    <a class="btn btn-primary mt-3" href="{% url 'manager:task_list' %}">Back to List</a>
  {% endif %}
{% endblock %}
